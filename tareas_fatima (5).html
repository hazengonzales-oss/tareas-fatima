<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fátima ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --p1:#7C3AED; --p2:#9D5CF6; --p3:#C084FC; --p4:#E9D5FF; --p5:#F5EEFF;
  --acc:#A855F7; --gold:#FCD34D;
  --ink:#2D1B69; --ink2:#6B4FA0; --ink3:#A78BC0;
  --card:rgba(255,255,255,0.78); --card2:rgba(255,255,255,0.55);
  --shadow:rgba(124,58,237,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Nunito',sans-serif;
  background:linear-gradient(145deg,#F0E8FF 0%,#E8D5FA 35%,#EDD9FF 65%,#E4CFFC 100%);
  min-height:100vh; color:var(--ink);
  padding:24px 14px 80px;
  position:relative; overflow-x:hidden;
}

/* FLOATING CATS */
.cat-deco{position:fixed;pointer-events:none;z-index:0;font-size:40px;opacity:.12;user-select:none;}
.cat-deco.c1{bottom:20px;right:16px;transform:scaleX(-1);}
.cat-deco.c2{top:90px;left:8px;font-size:22px;transform:rotate(-15deg);}
.cat-deco.c3{bottom:120px;left:20px;font-size:28px;transform:rotate(10deg);}
.cat-deco.c4{top:50%;right:10px;font-size:18px;opacity:.09;}

.wrap{max-width:560px;margin:0 auto;position:relative;z-index:1;}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.h-title h1{font-family:'Fredoka',sans-serif;font-size:32px;color:var(--p1);letter-spacing:-.5px;}
.h-title h1 em{font-style:normal;color:var(--acc);}
.h-title p{font-size:13px;color:var(--ink2);font-weight:600;margin-top:2px;}
.mood-circle{
  width:62px;height:62px;border-radius:50%;
  background:linear-gradient(135deg,var(--p3),var(--p2));
  display:flex;align-items:center;justify-content:center;
  font-size:32px;flex-shrink:0;
  box-shadow:0 6px 18px rgba(168,85,247,.35);
}
.mood-circle.pop{animation:mpop .5s ease;}
@keyframes mpop{0%{transform:scale(1)}50%{transform:scale(1.2) rotate(8deg)}100%{transform:scale(1)}}

/* VIEW TABS */
.tabs{
  display:flex;background:var(--card);border-radius:16px;padding:5px;
  box-shadow:0 4px 14px var(--shadow);margin-bottom:16px;gap:4px;
}
.tab-btn{
  flex:1;border:none;border-radius:12px;padding:9px 0;
  font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;
  color:var(--ink2);background:transparent;cursor:pointer;transition:all .2s;
}
.tab-btn.active{background:var(--p1);color:#fff;box-shadow:0 4px 10px rgba(124,58,237,.3);}

/* DATE NAV (día/semana) */
.datebar{
  background:var(--card);border-radius:16px;padding:11px 14px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 4px 14px var(--shadow);margin-bottom:16px;
}
.datebar .nav{
  background:var(--p5);border:none;width:34px;height:34px;border-radius:10px;
  font-size:18px;color:var(--p1);cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.datebar .nav:hover{background:var(--p4);}
.datebar .dmid{text-align:center;flex:1;}
.today-pill{
  background:var(--p1);color:#fff;border:none;
  font-size:10px;font-weight:800;letter-spacing:.5px;
  padding:2px 10px;border-radius:20px;margin-bottom:3px;
  cursor:pointer;display:inline-block;font-family:'Nunito',sans-serif;
}
.date-lbl{font-family:'Fredoka',sans-serif;font-size:15px;font-weight:600;text-transform:capitalize;}

/* PROGRESS */
.prog-card{
  background:var(--card);border-radius:16px;padding:14px 16px;
  box-shadow:0 4px 14px var(--shadow);margin-bottom:18px;
}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.prog-lbl{font-size:11px;font-weight:800;letter-spacing:.6px;color:var(--ink2);text-transform:uppercase;}
.prog-pct{font-family:'Fredoka',sans-serif;font-size:18px;color:var(--p1);}
.bar-track{height:9px;border-radius:20px;background:var(--p5);overflow:hidden;}
.bar-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--p3),var(--p1));transition:width .4s ease;}

/* ADD TASK */
.add-row{display:flex;gap:8px;margin-bottom:20px;}
.add-row select,.add-row input,.add-row button{height:46px;}
.add-row select{
  border:none;background:var(--card);border-radius:14px;padding:0 10px;
  font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;color:var(--ink);
  box-shadow:0 4px 14px var(--shadow);
}
.add-row input{
  flex:1;border:none;border-radius:14px;padding:0 16px;
  font-family:'Nunito',sans-serif;font-size:15px;color:var(--ink);
  box-shadow:0 4px 14px var(--shadow);background:var(--card);
}
.add-row input::placeholder{color:var(--ink3);}
.add-row button{
  width:46px;border:none;border-radius:14px;background:var(--p1);color:#fff;
  font-size:22px;cursor:pointer;box-shadow:0 6px 14px rgba(124,58,237,.35);
  transition:background .15s,transform .1s;
}
.add-row button:hover{background:var(--p2);}
.add-row button:active{transform:scale(.94);}

/* DAY VIEW - CATEGORY SECTIONS */
.cat-section{margin-bottom:18px;}
.cat-head{display:flex;align-items:center;gap:7px;margin-bottom:8px;padding-left:2px;}
.cat-head .ico{font-size:16px;}
.cat-head h2{font-family:'Fredoka',sans-serif;font-size:16px;font-weight:600;}
.cat-head .cnt{font-size:12px;color:var(--ink3);font-weight:700;}
.empty-cat{font-size:13px;color:var(--ink3);font-weight:600;padding:8px 4px;font-style:italic;}

.task{
  display:flex;align-items:center;gap:11px;
  background:var(--card);border-radius:13px;padding:11px 13px;margin-bottom:7px;
  box-shadow:0 3px 10px var(--shadow);
  border-left:5px solid transparent;
  transition:opacity .25s, transform .2s;
}
.task.done{opacity:.5;}
.check-btn{
  width:26px;height:26px;border-radius:50%;border:2.5px solid var(--p4);
  flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:13px;color:#fff;transition:all .15s;background:transparent;
}
.check-btn.on{border-color:transparent;}
.task-txt{flex:1;font-size:15px;font-weight:600;}
.task.done .task-txt{text-decoration:line-through;color:var(--ink3);}
.del-btn{border:none;background:none;color:var(--p4);font-size:17px;cursor:pointer;padding:4px;line-height:1;}
.del-btn:hover{color:var(--p2);}

.cat-colegio{border-color:#7C3AED;}
.cat-colegio .check-btn.on{background:#7C3AED;}
.cat-casa{border-color:#A855F7;}
.cat-casa .check-btn.on{background:#A855F7;}
.cat-icpna{border-color:#C084FC;}
.cat-icpna .check-btn.on{background:#C084FC;}

/* WEEK VIEW */
.week-grid{display:flex;flex-direction:column;gap:10px;}
.week-day-card{
  background:var(--card);border-radius:14px;padding:13px 14px;
  box-shadow:0 3px 10px var(--shadow);
}
.week-day-head{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;
}
.week-day-name{font-family:'Fredoka',sans-serif;font-size:15px;font-weight:600;text-transform:capitalize;}
.week-day-name.is-today{color:var(--p1);}
.week-day-num{
  font-size:11px;font-weight:700;color:var(--ink3);
  background:var(--p5);padding:2px 8px;border-radius:8px;
}
.week-day-num.is-today{background:var(--p1);color:#fff;}
.week-tasks-mini{display:flex;flex-wrap:wrap;gap:5px;}
.mini-task{
  font-size:12px;font-weight:600;padding:3px 9px;border-radius:10px;
  background:var(--p5);color:var(--ink2);
  display:flex;align-items:center;gap:4px;cursor:pointer;
}
.mini-task.done{text-decoration:line-through;opacity:.5;}
.mini-task .mc{font-size:11px;color:#fff;width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;}
.week-empty{font-size:12px;color:var(--ink3);font-style:italic;}
.week-bar-wrap{margin-top:8px;}
.week-bar-track{height:5px;border-radius:10px;background:var(--p5);overflow:hidden;}
.week-bar-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--p3),var(--p1));transition:width .3s;}

/* MONTH VIEW */
.month-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.month-title{font-family:'Fredoka',sans-serif;font-size:20px;font-weight:600;text-transform:capitalize;}
.month-nav{background:var(--p5);border:none;width:34px;height:34px;border-radius:10px;font-size:18px;color:var(--p1);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.month-nav:hover{background:var(--p4);}
.month-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px;}
.dow-lbl{text-align:center;font-size:11px;font-weight:800;color:var(--ink2);text-transform:uppercase;padding:4px 0;}
.month-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-day{
  border-radius:10px;padding:6px 4px;min-height:54px;
  background:var(--card2);cursor:pointer;transition:background .15s;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.cal-day:hover{background:var(--p4);}
.cal-day.other-month{opacity:.35;}
.cal-day.is-today .day-num{background:var(--p1);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.day-num{font-size:12px;font-weight:700;color:var(--ink);}
.cal-day.is-today .day-num{color:#fff;}
.day-dots{display:flex;flex-wrap:wrap;justify-content:center;gap:2px;margin-top:2px;}
.dot-task{width:6px;height:6px;border-radius:50%;}
.dot-done{opacity:.4;}
.day-pct-mini{font-size:9px;font-weight:800;color:var(--ink2);margin-top:1px;}

footer{text-align:center;margin-top:32px;color:var(--ink3);font-size:12px;font-weight:600;}
.refresh-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin:0 auto 24px;
  background:var(--card);border:2px solid var(--p4);
  color:var(--p1);font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;
  padding:12px 28px;border-radius:16px;cursor:pointer;
  box-shadow:0 4px 14px var(--shadow);
  transition:all .2s;
}
.refresh-btn:hover{background:var(--p4);}
.refresh-btn:active{transform:scale(.95);}
.refresh-btn .ico{font-size:20px;transition:transform .5s;}
.refresh-btn.spinning .ico{animation:spin .6s linear;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="cat-deco c1">🐱</div>
<div class="cat-deco c2">🐾</div>
<div class="cat-deco c3">🐾</div>
<div class="cat-deco c4">🐱</div>

<div class="wrap">
  <header>
    <div class="h-title">
      <h1><em>Fátima</em> ✨</h1>
      <p id="subtext">Cargando...</p>
    </div>
    <div class="mood-circle" id="mood">😺</div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" data-view="dia">Día</button>
    <button class="tab-btn" data-view="semana">Semana</button>
    <button class="tab-btn" data-view="mes">Mes</button>
  </div>

  <div id="view-dia">
    <div class="datebar">
      <button class="nav" id="prevDay">‹</button>
      <div class="dmid">
        <button class="today-pill" id="todayBtn" style="display:none">HOY</button>
        <div class="date-lbl" id="dateLabel">-</div>
      </div>
      <button class="nav" id="nextDay">›</button>
    </div>
    <div class="prog-card">
      <div class="prog-top">
        <span class="prog-lbl">Progreso del día</span>
        <span class="prog-pct" id="pct">0%</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
    </div>
    <div class="add-row">
      <select id="catSelect">
        <option value="colegio">🏫 Colegio</option>
        <option value="casa">🌟 Personal</option>
        <option value="icpna">🇬🇧 Icpna</option>
      </select>
      <input type="text" id="taskInput" placeholder="Agregar tarea...">
      <button id="addBtn">+</button>
    </div>
    <div id="sections"></div>
  </div>

  <div id="view-semana" style="display:none">
    <div class="datebar">
      <button class="nav" id="prevWeek">‹</button>
      <div class="dmid">
        <div class="date-lbl" id="weekLabel">-</div>
      </div>
      <button class="nav" id="nextWeek">›</button>
    </div>
    <div class="week-grid" id="weekGrid"></div>
  </div>

  <div id="view-mes" style="display:none">
    <div class="month-header">
      <button class="month-nav" id="prevMonth">‹</button>
      <div class="month-title" id="monthTitle">-</div>
      <button class="month-nav" id="nextMonth">›</button>
    </div>
    <div class="month-dow">
      <div class="dow-lbl">dom</div><div class="dow-lbl">lun</div>
      <div class="dow-lbl">mar</div><div class="dow-lbl">mié</div>
      <div class="dow-lbl">jue</div><div class="dow-lbl">vie</div>
      <div class="dow-lbl">sáb</div>
    </div>
    <div class="month-cal" id="monthCal"></div>
  </div>

  <button class="refresh-btn" id="refreshBtn">
    <span class="ico">🔄</span> Actualizar
  </button>
  <footer>Hecho con 💜 para Fátima 🐱</footer>
</div>

<script>
const CATS=[
  {id:'colegio',label:'Colegio',icon:'🏫',col:'#7C3AED'},
  {id:'casa',label:'Personal',icon:'🌟',col:'#A855F7'},
  {id:'icpna',label:'Icpna',icon:'🇬🇧',col:'#C084FC'},
];
const MONTHS=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DAYS=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const DAYS_SHORT=['dom','lun','mar','mié','jue','vie','sáb'];

let allTasks=[];
let currentDate=today0();
let currentWeekStart=weekStart(currentDate);
let currentMonth=new Date(currentDate.getFullYear(),currentDate.getMonth(),1);
let currentView='dia';

function today0(){const d=new Date();d.setHours(0,0,0,0);return d;}
function dateKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function sameDay(a,b){return dateKey(a)===dateKey(b);}
function weekStart(d){const c=new Date(d);c.setDate(c.getDate()-c.getDay());return c;}
function addDays(d,n){const c=new Date(d);c.setDate(c.getDate()+n);return c;}

const API_KEY='$2a$10$sfvLNY3lcXudSPIMItyMAuJR41aOiSJHHsoesRDlcWLBKeH4gSYg.';
const HEADERS={'Content-Type':'application/json','X-Master-Key':API_KEY,'X-Bin-Meta':'false'};
let BIN_ID=localStorage.getItem('fatima-bin-id')||null;

async function load(){
  document.getElementById('refreshBtn').disabled=true;
  try{
    if(!BIN_ID){
      const r=await fetch('https://api.jsonbin.io/v3/b',{
        method:'POST',headers:{...HEADERS,'X-Bin-Name':'fatima-tasks'},
        body:JSON.stringify([])
      });
      const d=await r.json();
      BIN_ID=d.metadata.id;
      localStorage.setItem('fatima-bin-id',BIN_ID);
      allTasks=[];
    } else {
      const r=await fetch('https://api.jsonbin.io/v3/b/'+BIN_ID+'/latest',{headers:HEADERS});
      const d=await r.json();
      allTasks=Array.isArray(d.record)?d.record:[];
    }
  }catch(e){console.error(e);allTasks=[];}
  document.getElementById('refreshBtn').disabled=false;
  renderAll();
}

async function save(){
  if(!BIN_ID)return;
  try{
    await fetch('https://api.jsonbin.io/v3/b/'+BIN_ID,{
      method:'PUT',headers:HEADERS,
      body:JSON.stringify(allTasks)
    });
  }catch(e){console.error(e);}
}

function tasksFor(d){return allTasks.filter(t=>t.date===dateKey(d));}
function progFor(d){const ts=tasksFor(d);return ts.length?Math.round(ts.filter(t=>t.done).length/ts.length*100):null;}

function mood(pct){
  if(pct===null||pct===0)return'😺';
  if(pct<50)return'😸';
  if(pct<100)return'😻';
  return'🎉';
}

function renderAll(){
  if(currentView==='dia')renderDay();
  else if(currentView==='semana')renderWeek();
  else renderMonth();
  // subtext & mood always reflect today
  const ts=tasksFor(today0());
  const done=ts.filter(t=>t.done).length;
  const pct=progFor(today0());
  document.getElementById('subtext').textContent=ts.length?(done+' de '+ts.length+' tareas hoy'):'Sin tareas para hoy';
  const m=document.getElementById('mood');
  m.textContent=mood(pct);
  m.classList.remove('pop');void m.offsetWidth;m.classList.add('pop');
}

/* ---- DAY VIEW ---- */
function renderDay(){
  const isToday=sameDay(currentDate,today0());
  document.getElementById('todayBtn').style.display=isToday?'none':'inline-block';
  document.getElementById('dateLabel').textContent=DAYS[currentDate.getDay()]+' '+currentDate.getDate()+' de '+MONTHS[currentDate.getMonth()];
  const ts=tasksFor(currentDate);
  const done=ts.filter(t=>t.done).length;
  const pct=ts.length?Math.round(done/ts.length*100):0;
  document.getElementById('pct').textContent=pct+'%';
  document.getElementById('barFill').style.width=pct+'%';

  const sec=document.getElementById('sections');
  sec.innerHTML='';
  CATS.forEach(cat=>{
    const all=ts.filter(t=>t.category===cat.id);
    // sort: pending first, done at bottom
    const pending=all.filter(t=>!t.done);
    const doneItems=all.filter(t=>t.done);
    const items=[...pending,...doneItems];

    const div=document.createElement('div');div.className='cat-section';
    div.innerHTML=`<div class="cat-head"><span class="ico">${cat.icon}</span><h2>${cat.label}</h2><span class="cnt">${doneItems.length}/${all.length}</span></div>`;
    if(items.length===0){
      div.innerHTML+=`<div class="empty-cat">No hay tareas de ${cat.label.toLowerCase()} hoy</div>`;
    } else {
      items.forEach(t=>{
        const row=document.createElement('div');
        row.className='task cat-'+cat.id+(t.done?' done':'');
        row.innerHTML=`<div class="check-btn${t.done?' on':''}" data-id="${t.id}">${t.done?'✓':''}</div><div class="task-txt">${esc(t.text)}</div><button class="del-btn" data-id="${t.id}">✕</button>`;
        div.appendChild(row);
      });
    }
    sec.appendChild(div);
  });
  sec.querySelectorAll('.check-btn').forEach(el=>el.addEventListener('click',()=>toggle(el.dataset.id)));
  sec.querySelectorAll('.del-btn').forEach(el=>el.addEventListener('click',()=>del(el.dataset.id)));
}

/* ---- WEEK VIEW ---- */
function renderWeek(){
  const lbl=DAYS[currentWeekStart.getDay()]+' '+currentWeekStart.getDate()+' – '+DAYS[addDays(currentWeekStart,6).getDay()]+' '+addDays(currentWeekStart,6).getDate()+' de '+MONTHS[addDays(currentWeekStart,6).getMonth()];
  document.getElementById('weekLabel').textContent=lbl;
  const g=document.getElementById('weekGrid');g.innerHTML='';
  for(let i=0;i<7;i++){
    const d=addDays(currentWeekStart,i);
    const ts=tasksFor(d);
    const pending=ts.filter(t=>!t.done);
    const doneItems=ts.filter(t=>t.done);
    const sorted=[...pending,...doneItems];
    const pct=ts.length?Math.round(doneItems.length/ts.length*100):0;
    const isTod=sameDay(d,today0());
    const card=document.createElement('div');card.className='week-day-card';
    card.innerHTML=`<div class="week-day-head"><span class="week-day-name${isTod?' is-today':''}">${DAYS[d.getDay()]} ${d.getDate()}</span><span class="week-day-num${isTod?' is-today':''}">${ts.length?pct+'%':'–'}</span></div>`;
    if(ts.length===0){
      card.innerHTML+=`<div class="week-empty">Sin tareas</div>`;
    } else {
      const wrap=document.createElement('div');wrap.className='week-tasks-mini';
      sorted.forEach(t=>{
        const c=CATS.find(x=>x.id===t.category);
        const span=document.createElement('span');
        span.className='mini-task'+(t.done?' done':'');
        span.innerHTML=`<span class="mc" style="background:${c.col}">${t.done?'✓':c.icon}</span>${esc(t.text)}`;
        span.addEventListener('click',()=>{toggle(t.id);});
        wrap.appendChild(span);
      });
      card.appendChild(wrap);
      if(ts.length){
        card.innerHTML+=`<div class="week-bar-wrap"><div class="week-bar-track"><div class="week-bar-fill" style="width:${pct}%"></div></div></div>`;
      }
    }
    // click day to jump to it
    card.querySelector('.week-day-head').addEventListener('click',()=>{
      currentDate=new Date(d);switchView('dia');
    });
    g.appendChild(card);
  }
}

/* ---- MONTH VIEW ---- */
function renderMonth(){
  document.getElementById('monthTitle').textContent=MONTHS[currentMonth.getMonth()]+' '+currentMonth.getFullYear();
  const cal=document.getElementById('monthCal');cal.innerHTML='';
  const first=new Date(currentMonth.getFullYear(),currentMonth.getMonth(),1);
  const start=addDays(first,-first.getDay());
  for(let i=0;i<42;i++){
    const d=addDays(start,i);
    const inMonth=d.getMonth()===currentMonth.getMonth();
    const isTod=sameDay(d,today0());
    const ts=tasksFor(d);
    const pct=progFor(d);
    const cell=document.createElement('div');
    cell.className='cal-day'+(inMonth?'':' other-month')+(isTod?' is-today':'');
    let inner=`<div class="day-num">${d.getDate()}</div>`;
    if(ts.length){
      inner+=`<div class="day-dots">`;
      ts.slice(0,5).forEach(t=>{
        const c=CATS.find(x=>x.id===t.category);
        inner+=`<div class="dot-task${t.done?' dot-done':''}" style="background:${c.col}"></div>`;
      });
      inner+=`</div>`;
      inner+=`<div class="day-pct-mini">${pct}%</div>`;
    }
    cell.innerHTML=inner;
    cell.addEventListener('click',()=>{currentDate=new Date(d);switchView('dia');});
    cal.appendChild(cell);
  }
}

/* ---- CONTROLS ---- */
function switchView(v){
  currentView=v;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
  document.getElementById('view-dia').style.display=v==='dia'?'':'none';
  document.getElementById('view-semana').style.display=v==='semana'?'':'none';
  document.getElementById('view-mes').style.display=v==='mes'?'':'none';
  renderAll();
}
document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>switchView(b.dataset.view)));

document.getElementById('prevDay').addEventListener('click',()=>{currentDate=addDays(currentDate,-1);renderAll();});
document.getElementById('nextDay').addEventListener('click',()=>{currentDate=addDays(currentDate,1);renderAll();});
document.getElementById('todayBtn').addEventListener('click',()=>{currentDate=today0();renderAll();});
document.getElementById('prevWeek').addEventListener('click',()=>{currentWeekStart=addDays(currentWeekStart,-7);renderAll();});
document.getElementById('nextWeek').addEventListener('click',()=>{currentWeekStart=addDays(currentWeekStart,7);renderAll();});
document.getElementById('prevMonth').addEventListener('click',()=>{currentMonth=new Date(currentMonth.getFullYear(),currentMonth.getMonth()-1,1);renderAll();});
document.getElementById('nextMonth').addEventListener('click',()=>{currentMonth=new Date(currentMonth.getFullYear(),currentMonth.getMonth()+1,1);renderAll();});

document.getElementById('addBtn').addEventListener('click',addTask);
document.getElementById('taskInput').addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});
function addTask(){
  const inp=document.getElementById('taskInput');
  const text=inp.value.trim();if(!text)return;
  const cat=document.getElementById('catSelect').value;
  allTasks.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),text,category:cat,done:false,date:dateKey(currentDate)});
  inp.value='';renderAll();save();
}

function toggle(id){
  const t=allTasks.find(x=>x.id===id);
  if(t){t.done=!t.done;renderAll();save();}
}
function del(id){allTasks=allTasks.filter(x=>x.id!==id);renderAll();save();}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

document.getElementById('refreshBtn').addEventListener('click', async ()=>{
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  btn.disabled = true;
  await load();
  setTimeout(()=>{ btn.classList.remove('spinning'); btn.disabled=false; }, 600);
});

load();
</script>
</body>
